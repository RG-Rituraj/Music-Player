<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeatStream | Premium Music Experience</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Ambient background glow elements -->
  <div class="ambient-glow bg-glow-1"></div>
  <div class="ambient-glow bg-glow-2"></div>

  <main class="dashboard-wrapper">
    <div class="player-container">
      
      <!-- Left Column: The Main Music Player -->
      <section class="main-player">
        <header class="player-header">
          <div class="brand">
            <i class="fa-solid fa-compact-disc brand-logo"></i>
            <span>BeatStream</span>
          </div>
          <span class="status-indicator">Now Playing</span>
        </header>

        <!-- Album Art Display -->
        <div class="album-art-section">
          <div class="art-glow" id="art-glow"></div>
          <div class="art-container">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=300&auto=format&fit=crop" alt="Album Cover" id="album-art" class="album-art">
          </div>
        </div>

        <!-- Song Details -->
        <div class="track-info">
          <div class="scroll-container">
            <h1 id="track-title" class="track-title">Loading track...</h1>
          </div>
          <p id="track-artist" class="track-artist">Please wait</p>
        </div>

        <!-- Progress Seek Bar -->
        <div class="progress-section">
          <div class="time-display">
            <span id="current-time">0:00</span>
            <span id="total-duration">0:00</span>
          </div>
          <div class="slider-container">
            <input type="range" id="progress-slider" min="0" max="100" value="0" class="styled-slider">
            <div class="slider-progress" id="progress-bar-fill"></div>
          </div>
        </div>

        <!-- Main Audio Control Panel -->
        <div class="controls-section">
          <button id="shuffle-btn" class="control-btn" title="Shuffle Toggle">
            <i class="fa-solid fa-shuffle"></i>
          </button>
          
          <button id="prev-btn" class="control-btn" title="Previous Song">
            <i class="fa-solid fa-backward-step"></i>
          </button>
          
          <button id="play-btn" class="control-btn play-pause-btn" title="Play">
            <i class="fa-solid fa-play"></i>
          </button>
          
          <button id="next-btn" class="control-btn" title="Next Song">
            <i class="fa-solid fa-forward-step"></i>
          </button>
          
          <button id="repeat-btn" class="control-btn" title="Repeat Mode">
            <i class="fa-solid fa-repeat"></i>
            <span class="repeat-badge" id="repeat-badge">1</span>
          </button>
        </div>

        <!-- Volume Control Panel -->
        <div class="volume-section">
          <button id="mute-btn" class="volume-btn" title="Mute/Unmute">
            <i class="fa-solid fa-volume-high"></i>
          </button>
          <div class="volume-slider-container">
            <input type="range" id="volume-slider" min="0" max="100" value="70" class="styled-slider">
            <div class="slider-progress" id="volume-bar-fill" style="width: 70%;"></div>
          </div>
        </div>
      </section>

      <!-- Right Column: Queue, Playlist & Upload Center -->
      <section class="sidebar-playlist">
        <header class="playlist-header">
          <h2>Play Queue</h2>
          <span class="track-count" id="track-count">0 Songs</span>
        </header>

        <!-- Import / Drag & Drop Audio Upload Center -->
        <div class="upload-container">
          <label for="file-upload" class="upload-label">
            <div class="upload-content">
              <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
              <div class="upload-text">
                <span class="highlight">Add your own music</span>
                <span class="subtext">Drag & drop files or click here</span>
              </div>
            </div>
            <input type="file" id="file-upload" accept="audio/*" multiple>
          </label>
        </div>

        <!-- Playlist Tracks List -->
        <div class="tracks-list-wrapper">
          <ul class="tracks-list" id="tracks-list">
            <!-- Playlist items injected via Javascript -->
          </ul>
        </div>
      </section>

    </div>
  </main>

  <!-- JavaScript Audio Controller -->
  <script src="app.js"></script>
</body>
</html>
